<!DOCTYPE html>
<html>
<head>
    <title>LegalTech Contract Parser</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <div class="text-center">

        <h1>📄 LegalTech Contract Parser</h1>

        <p class="text-muted">
            Upload, process and analyze legal contracts.
        </p>

    </div>

    <div class="row mt-4">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h4>Upload Contract</h4>

                    <p>Upload PDF contracts for processing.</p>

                    <a href="/upload/" class="btn btn-primary">
                        Upload
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h4>View Contracts</h4>

                    <p>Browse uploaded contracts.</p>

                    <a href="/contracts/" class="btn btn-success">
                        View
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
